subinfo_fields:
- name: subject_id
  type: int
  constraints:
    min: 101
    max: 999
    digits: 3
subinfo_mapping:
  subject_id: 被试编号（3位）
  Participant Information: 被试信息
  registration_failed: 注册失败
  registration_successful: 注册成功
  invalid_input: '{field} 输入无效'
window:
  size:
  - 1280
  - 720
  units: pix
  screen: 0
  bg_color: gray
  fullscreen: false
  monitor_width_cm: 35.5
  monitor_distance_cm: 60
task:
  task_name: passive_lottery
  save_path: ./outputs/sim
  total_blocks: 1
  total_trials: 9
  trial_per_block: 9
  conditions:
  - gain
  - loss
  - mixed
  key_list:
  - space
  seed_mode: same_across_sub
  initial_score: 0
  delta: 1
  language: Chinese
  voice_name: zh-CN-YunyangNeural
  voice_enabled: false
timing:
  condition_cue_duration: 0.3
  pre_lottery_fixation_duration: 0.4
  lottery_reveal_duration: 0.5
  outcome_feedback_duration: 0.4
  iti_duration: 0.3
stimuli:
  fixation:
    type: text
    text: +
    color: white
    height: 48
    font: SimHei
  instruction_text:
    type: text
    text: '被动抽奖任务（Scripted Sim）


      按空格键开始。

      '
    color: white
    height: 28
    wrapWidth: 980
    font: SimHei
  condition_cue:
    type: text
    text: '本轮：{condition_label}

      请注视中央并等待开奖

      '
    color: white
    height: 36
    wrapWidth: 980
    font: SimHei
  lottery_offer:
    type: text
    text: '抽奖规则

      {prob_a}% 概率：{outcome_a:+d} 分

      {rest_prob}% 概率：{outcome_b:+d} 分

      '
    color: white
    height: 34
    wrapWidth: 980
    font: SimHei
  outcome_win:
    type: text
    text: '本轮结果：+{outcome_value} 分

      当前累计：{total_score} 分

      '
    color: green
    height: 40
    wrapWidth: 980
    font: SimHei
  outcome_neutral:
    type: text
    text: '本轮结果：{outcome_value:+d} 分

      当前累计：{total_score} 分

      '
    color: white
    height: 40
    wrapWidth: 980
    font: SimHei
  outcome_loss:
    type: text
    text: '本轮结果：{outcome_value} 分

      当前累计：{total_score} 分

      '
    color: red
    height: 40
    wrapWidth: 980
    font: SimHei
  block_break:
    type: text
    text: 'Scripted Sim 区块结束

      中奖率：{win_rate:.1%}

      本区块得分：{block_score:+d}

      当前累计得分：{total_score}


      按空格键继续。

      '
    color: white
    height: 26
    wrapWidth: 980
    font: SimHei
  good_bye:
    type: text
    text: 'Scripted Sim 结束

      最终得分：{total_score}


      按空格键退出。

      '
    color: white
    height: 30
    wrapWidth: 980
    font: SimHei
triggers:
  map:
    exp_onset: 1
    exp_end: 2
    block_onset: 10
    block_end: 11
    gain_condition_cue_onset: 20
    loss_condition_cue_onset: 21
    mixed_condition_cue_onset: 22
    gain_pre_lottery_fixation_onset: 30
    loss_pre_lottery_fixation_onset: 31
    mixed_pre_lottery_fixation_onset: 32
    gain_lottery_reveal_onset: 40
    loss_lottery_reveal_onset: 41
    mixed_lottery_reveal_onset: 42
    gain_win_outcome_feedback_onset: 50
    gain_neutral_outcome_feedback_onset: 51
    gain_loss_outcome_feedback_onset: 52
    loss_win_outcome_feedback_onset: 53
    loss_neutral_outcome_feedback_onset: 54
    loss_loss_outcome_feedback_onset: 55
    mixed_win_outcome_feedback_onset: 56
    mixed_neutral_outcome_feedback_onset: 57
    mixed_loss_outcome_feedback_onset: 58
    iti_onset: 60
  driver:
    type: serial_url
    url: loop://
    baudrate: 115200
  timing:
    post_delay_ms: 1
  policy:
    strict: false
condition_generation:
  seed: 22022
  enable_logging: true
  lottery_profiles:
    gain:
      label: 增益彩票
      prob_a: 0.75
      outcome_a: 10
      outcome_b: 0
    loss:
      label: 损失彩票
      prob_a: 0.75
      outcome_a: -10
      outcome_b: 0
    mixed:
      label: 混合彩票
      prob_a: 0.5
      outcome_a: 10
      outcome_b: -10
sim:
  output_dir: outputs/sim
  seed: 22022
  participant_id: sim001
  session_id: sub-sim001_task-passive_lottery_seed22022
  log_path: outputs/sim/sub-sim001_task-passive_lottery_seed22022_sim_events.jsonl
  policy: warn
  default_rt_s: 0.2
  clamp_rt: false
  responder:
    type: scripted
    kwargs:
      key: space
      rt_s: 0.25
